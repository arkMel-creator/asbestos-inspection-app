    bottom: 15px;
    visibility: visible;
    opacity: 1;
}

.userpilot-nps {
    position: absolute;
    width: 576px;
    bottom: 0px;
    left: 0px;
    right: 0px;
    margin: auto;
    border-radius: 6px;
    text-align: center;
    overflow: hidden;
    background: white;
    visibility: hidden;
    opacity: 0;
    transition: bottom 0.3s, visibility 0.3s, opacity 0.3s;
}

.navbar {
    width: 100%;
    height: 4px;
    font-size: 0px;
}

.navbar .line {
    display: inline-block;
    width: 50%;
    height: 100%;
}

.nps-top {
    position: relative;
    display: block;
    text-align: right;
    min-height: 40px;
}

.nps-top .btn {
    cursor: pointer;
    display: inline-block;
    font-size: 12px;
    padding: 9px 19px;
    background-color: rgba(73, 80, 87, 0.7);
    border-radius: 0px 0px 0px 6px;
    z-index: 1;
}

.progress-ball {
    margin-top: 16px;
    display: block;
}

.progress-ball span{
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: inline-block;
}

.progress-ball span:first-child{
    margin-right: 8px;
}

.nps-content {
    padding: 0px 48px 40px 48px;
}

.nps-content h3 {
    padding: 16px 0px;
    font-style: normal;
    font-weight: 600;
    font-size: 16px;
    line-height: 22px;
    text-align: initial;
    margin: 0px;
}

.nps-top .navi {
    position: absolute;
    right: 0px;
    left: 0px;
    top: 0px;
    margin: auto;
}

.nps-top .navi span {
    width: 35px;
    background: black;
    display: inline-block;
    height: 7px;
    border-radius: 2rem;
    opacity: 0.3;
}

.nps-top .navi span:first-child {
    margin-right: 10px;
}

.nps-score-container {
    width: 100%;
    display: inline-block;
    font-size: 0px;
}

.nps-score-container .nps-score span {
    display: inline-block;
    margin: 0px;
    line-height: 40px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    margin-left: 4px;
    transition: background-color 0.3s ease;
    position: relative;
    font-size: 16px;
    font-weight: 600;
}
.nps-score-container .nps-score span:after {
    content: '';
    position: absolute;
    top: 0px;
    left: 0px;
    width: 100%;
    height: 100%;
    border-right: 4px solid transparent;
}

.nps-score-container .nps-score span.selected {
    background: #3a3a3a;
    color: white;
    border-color: #3a3a3a !important;
}

.nps-score-container .nps-score span:first-child {
    margin-left: 0px !important;
}

.nps-score-container .nps-score span:last-child {
    border-right: 0px !important;
}

.nps-score-container .score-bottom span {
    font-weight: 400;
    font-size: 12px;
    line-height: 16px;
    float: right;
    max-width: 50%;
    text-align: left;
}

.nps-score-container .score-bottom span:first-child {
    float: left;
}

.nps-score-container .score-bottom {
    margin-top: 4px;
}

.nps-form textarea {
    height: 70px;
    resize: none;
    background-color: transparent;
    width: 100%;
    border: 1px solid #DDE2E5;
    padding: 8px 16px;
    max-width: 100%;
    box-shadow: rgb(16 24 40 / 5%) 0px 1px 2px;
    font-family: inherit;
    border-radius: 5px;
    outline: none;
}
/* .nps-form textarea::placeholder {
    color: rgb(172, 181, 189);
} */

.nps-form {
    display: inline-block;
    width: 100%;
}

.charsize {
    text-align: right;
    /* color: rgb(172, 181, 189); */
    font-size: 14px;
    align-self: flex-end;
    font-weight: 400;
}

.feedbackBtnsContainer {
    display: block;
    text-align: end;
    margin-top: 16px;

    display: flex;
    justify-content: flex-end;
    column-gap: 16px;
}

.feedbackBtnsContainer .btn{
    /* max-width: 196px; */
    text-align: center;
}

div#updateScore {
    display: inline-block;
    border: 1px solid transparent;
    cursor: pointer;
    padding: 8px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    border-radius: 5px;

    color: rgb(0, 0, 0);
    border-color: rgb(208, 213, 221);
    background-color: transparent;
    /* margin-right: 16px; */
    display: flex;
    align-items: center;
}

div#submitFeedback {
    display: inline-block;
    border: 1px solid transparent;
    cursor: pointer;
    padding: 8px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    border-radius: 5px;
    display: flex;
    align-items: center;
}

.btn#submitFeedback {
    cursor: pointer;
}

.nps-content svg {
    height: 20px;
    vertical-align: middle;
    margin-right: 15px;
}

.userpilot-nps#feedback h3 {
    padding: 0px;
    margin-top: 0px;
    margin-bottom: 16px;
}

.userpilot-nps.thanks h3 {
    display: block;
    margin: 0px;
    padding: 0px;
    font-weight: 600;
    font-size: 16px;
}
.userpilot-nps.thanks h4{
    display: block;
    padding-top: 16px;
    margin: 0px;
    font-size: 14px;
    font-weight: 400;
}

.userpilot-nps.thanks h4:empty {
    display: none;
}

.userpilot-nps.thanks {
    text-align: left;
}

.userpilot-nps#completed .completed-btn {
    border: 1px solid transparent;
    cursor: pointer;
    padding: 8px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    border-radius: 5px;
    color: rgb(255, 255, 255);
    align-self: center;
    background-color: rgb(233, 30, 99);
    display: block;
    margin-top: 16px;
    margin-left: auto;
    margin-right: auto;
}

.logo img {
    max-width: 120px;
    max-height: 120px;
}

.logo img[src=""] {
    display: none
}

.powered svg {
    width: 11px;
    vertical-align: middle;
    margin-right: 6px;
}

.powered {
    position: absolute;
    right: 15px;
    font-size: 11px;
    color: gray;
}

.powered a {
    font-size: inherit;
    color: inherit;
    text-decoration: none;
}

.powered span {
    display: inline-block;
    vertical-align: middle;
}

.userpilot-nps[theme="2"] {
    background: ' + settings['theme']['color'] + ';
    color: white;
    box-shadow: none;
}

.userpilot-nps[theme="2"] .nps-top .navi span {
    background: white;
}

.userpilot-nps[theme="2"] .nps-score-container .nps-score span:not(.selected) {
    border-color: #ffffff9e;
}

.userpilot-nps[theme="2"] div#submitFeedback {
    background: white !important;
    color: black;
}

.userpilot-nps[theme="2"] .charsize {
    color: #ffffffb0;
}

.userpilot-nps[theme="2"] .powered a {
    color: white;
}

}

[direction="rtl"] .nps-score-container .nps-score span:last-child {

}

}

    }

    .userpilot-nps {

    }
